; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; [env:freenove_esp32_s3_wroom]
; platform = espressif32
; board = freenove_esp32_s3_wroom
; framework = arduino
; monitor_speed = 115200


[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino

; Pin the 8MB OTA-capable partition table (app0/app1 + otadata) so a USB
; re-flash never reverts the layout out from under a network (OTA) update.
board_build.partitions = default_8MB.csv

lib_deps =
  https://github.com/peterjmayhew/TFT_eSPI.git

build_flags =
  -Ilib/TFT_eSPI
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DUSE_UBX=1

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = esp32_exception_decoder

; Over-the-air upload (no USB). Flash with:
;   pio run -e esp32-s3-ota -t upload --upload-port <device-IP>
; Use the device's LAN IP (shown on the dashboard "Network" tile / serial),
; not the .local name — Windows can't resolve mDNS without Bonjour. If the
; device has an OTA password (secrets.h OTA_PASSWORD), add --auth=<pw>. If the
; transfer stalls after "Authenticating", pin a firewall rule for TCP 45678 or
; add --host_ip=<your PC LAN IP> to upload_flags.
[env:esp32-s3-ota]
extends = env:esp32-s3-devkitm-1
upload_protocol = espota
upload_port = sat-01.local
upload_flags =
  --port=3232
  --host_port=45678